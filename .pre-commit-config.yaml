repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        files: \\.rs$
        pass_filenames: false
        always_run: true

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        files: \\.rs$
        pass_filenames: false
        always_run: true

      - id: pnpm-check
        name: pnpm check
        entry: pnpm check
        language: system
        files: \\.(svelte|ts|js)$
        pass_filenames: false
        always_run: true
